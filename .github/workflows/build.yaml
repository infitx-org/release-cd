name: Build
run-name: Build => ${{ github.event.pull_request.title }}

on:
  pull_request:
    branches: [main]

jobs:
  build:
    uses: infitx-org/actions/.github/workflows/rush.yaml@main

  changes:
    runs-on: ubuntu-latest
    outputs:
      james: ${{ steps.filter.outputs.james }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            james:
              - 'app/james/**'

  james-tests:
    name: James app unit tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.james == 'true'

    defaults:
      run:
        working-directory: app/james
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            app/james/requirements.txt
            app/james/requirements-test.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt
      - name: Run pytest
        run: pytest tests/ -v --tb=short
